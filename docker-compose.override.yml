version: '3.9'

services:
  sqlserver:
    ports:
      - '1433:1433'
    environment:
      MSSQL_SA_PASSWORD: 'P@ssw0rd123'

  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
